name: Build JustPlayer Plus

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - just-player-plus/**
      - tools/check_plus_preferences.py
      - .github/workflows/build-just-player-plus.yml
  pull_request:
    paths:
      - just-player-plus/**
      - tools/check_plus_preferences.py
      - IMPLEMENTATION_PLAN.md
      - .github/workflows/build-just-player-plus.yml

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: just-player-plus

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: feature/ai-subtitles

      # BEGIN ONE-SHOT OPENSUBTITLES V3 PATCH
      - name: Apply direct OpenSubtitles v3 integration
        if: github.event_name == 'pull_request' && hashFiles('.patches/run-opensubtitles-v3') != ''
        working-directory: .
        run: |
          set -euo pipefail
          python3 .patches/apply_opensubtitles_v3.py
          rm -rf .patches
          rm -f .github/workflows/apply-opensubtitles-v3.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add direct OpenSubtitles v3 subtitle loading"
          git push origin HEAD:feature/ai-subtitles
      # END ONE-SHOT OPENSUBTITLES V3 PATCH

      - name: Verify Plus preference wiring
        working-directory: .
        run: python3 tools/check_plus_preferences.py

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
          cache-dependency-path: just-player-plus/**/*.gradle*

      - name: Restore release signing key from secrets
        if: github.event_name != 'pull_request'
        working-directory: .
        env:
          JPP_SIGNING_STORE_BASE64: ${{ secrets.JPP_SIGNING_STORE_BASE64 }}
          JPP_SIGNING_STORE_PASSWORD: ${{ secrets.JPP_SIGNING_STORE_PASSWORD }}
          JPP_SIGNING_KEY_ALIAS: ${{ secrets.JPP_SIGNING_KEY_ALIAS }}
        run: |
          set -euo pipefail
          umask 077
          : "${JPP_SIGNING_STORE_BASE64:?Missing JPP_SIGNING_STORE_BASE64 secret}"
          : "${JPP_SIGNING_STORE_PASSWORD:?Missing JPP_SIGNING_STORE_PASSWORD secret}"
          : "${JPP_SIGNING_KEY_ALIAS:?Missing JPP_SIGNING_KEY_ALIAS secret}"
          mkdir -p "$RUNNER_TEMP/justplayer-plus-signing"
          printf '%s' "$JPP_SIGNING_STORE_BASE64" \
            | base64 --decode \
            > "$RUNNER_TEMP/justplayer-plus-signing/release.p12"
          keytool -list -v \
            -keystore "$RUNNER_TEMP/justplayer-plus-signing/release.p12" \
            -storepass "$JPP_SIGNING_STORE_PASSWORD" \
            -alias "$JPP_SIGNING_KEY_ALIAS" | grep -E 'Alias name:|SHA256:'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-34" "platforms;android-36" "build-tools;36.0.0"

      - name: Run smart-selection unit tests
        run: ./gradlew testLatestUniversalDebugUnitTest --stacktrace --console=plain

      - name: Build signed release APK
        if: github.event_name != 'pull_request'
        env:
          JPP_SIGNING_STORE_FILE: ${{ runner.temp }}/justplayer-plus-signing/release.p12
          JPP_SIGNING_STORE_PASSWORD: ${{ secrets.JPP_SIGNING_STORE_PASSWORD }}
          JPP_SIGNING_KEY_ALIAS: ${{ secrets.JPP_SIGNING_KEY_ALIAS }}
          JPP_SIGNING_KEY_PASSWORD: ${{ secrets.JPP_SIGNING_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          set +e
          ./gradlew assembleLatestUniversalRelease --stacktrace --console=plain > ../gradle-build.log 2>&1
          status=$?
          tail -n 200 ../gradle-build.log
          exit $status

      - name: Build debug APK for pull request
        if: github.event_name == 'pull_request'
        run: |
          chmod +x gradlew
          set +e
          ./gradlew assembleLatestUniversalDebug --stacktrace --console=plain > ../gradle-build.log 2>&1
          status=$?
          tail -n 200 ../gradle-build.log
          exit $status

      - name: Verify APK signature
        if: github.event_name != 'pull_request'
        run: |
          APK=$(find app/build/outputs/apk -type f -name '*.apk' | head -n 1)
          test -n "$APK"
          EXPECTED_CERT_SHA256="2ed454eb2e649b18c3b8c7e6fa3fb66f380812ad57496665f75acba767c62802"
          ACTUAL_CERT_SHA256=$("$ANDROID_HOME/build-tools/36.0.0/apksigner" \
            verify --print-certs "$APK" \
            | sed -n 's/^Signer #1 certificate SHA-256 digest: //p')
          test "$ACTUAL_CERT_SHA256" = "$EXPECTED_CERT_SHA256"

      - name: Upload Gradle build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: justplayer-plus-gradle-log
          path: gradle-build.log
          if-no-files-found: warn

      - name: Collect APK
        run: |
          mkdir -p ../artifacts
          find app/build/outputs/apk -type f -name '*.apk' -exec cp {} ../artifacts/ \;
          ls -lah ../artifacts

      - name: Upload APK
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: justplayer-plus-signed-apk
          path: artifacts/*.apk
          if-no-files-found: error

      - name: Upload pull request APK
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: justplayer-plus-debug-apk
          path: artifacts/*.apk
          if-no-files-found: error
