name: Build JustPlayer Plus

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - just-player-plus/**
      - tools/check_plus_preferences.py
      - .github/workflows/build-just-player-plus.yml
  pull_request:
    paths:
      - just-player-plus/**
      - tools/check_plus_preferences.py
      - IMPLEMENTATION_PLAN.md
      - .github/workflows/build-just-player-plus.yml

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: just-player-plus
    env:
      JPP_SIGNING_STORE_FILE: ${{ github.workspace }}/.ci-signing/justplayer-plus-test.jks
      JPP_SIGNING_STORE_PASSWORD: JustPlayerPlusTest2026
      JPP_SIGNING_KEY_ALIAS: justplayer-plus-test
      JPP_SIGNING_KEY_PASSWORD: JustPlayerPlusTest2026

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify Plus preference wiring
        working-directory: .
        run: python3 tools/check_plus_preferences.py

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
          cache-dependency-path: just-player-plus/**/*.gradle*

      - name: Restore original Shield signing key
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .ci-signing
          curl --fail --location \
            --header "Authorization: Bearer $GH_TOKEN" \
            --header "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/actions/artifacts/8440770390/zip" \
            --output signing-key.zip
          unzip -j -o signing-key.zip -d .ci-signing
          test -f "$JPP_SIGNING_STORE_FILE"
          keytool -list -v \
            -keystore "$JPP_SIGNING_STORE_FILE" \
            -storepass "$JPP_SIGNING_STORE_PASSWORD" \
            -alias "$JPP_SIGNING_KEY_ALIAS" | grep -E 'Alias name:|SHA256:'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-34" "platforms;android-36" "build-tools;36.0.0"

      - name: Run smart-selection unit tests
        run: ./gradlew testLatestUniversalDebugUnitTest --stacktrace --console=plain

      - name: Build signed release APK
        run: |
          chmod +x gradlew
          set +e
          ./gradlew assembleLatestUniversalRelease --stacktrace --console=plain > ../gradle-build.log 2>&1
          status=$?
          tail -n 200 ../gradle-build.log
          exit $status

      - name: Verify APK signature
        run: |
          APK=$(find app/build/outputs/apk -type f -name '*.apk' | head -n 1)
          test -n "$APK"
          "$ANDROID_HOME/build-tools/36.0.0/apksigner" verify --verbose --print-certs "$APK"
          "$ANDROID_HOME/build-tools/36.0.0/apksigner" verify --print-certs "$APK" \
            | grep -F "Signer #1 certificate SHA-256 digest: 76537315f4ab044258d3e280c8d4d44a31ad8de1066729f4fa868fb7b9140ca9"

      - name: Upload Gradle build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: justplayer-plus-gradle-log
          path: gradle-build.log
          if-no-files-found: warn

      - name: Collect APK
        run: |
          mkdir -p ../artifacts
          find app/build/outputs/apk -type f -name '*.apk' -exec cp {} ../artifacts/ \;
          ls -lah ../artifacts

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: justplayer-plus-signed-apk-original-key
          path: artifacts/*.apk
          if-no-files-found: error
