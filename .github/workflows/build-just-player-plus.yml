name: Build JustPlayer Plus

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - just-player-plus/**
      - tools/check_plus_preferences.py
      - .github/workflows/build-just-player-plus.yml
  pull_request:
    paths:
      - just-player-plus/**
      - tools/check_plus_preferences.py
      - IMPLEMENTATION_PLAN.md
      - .github/workflows/build-just-player-plus.yml