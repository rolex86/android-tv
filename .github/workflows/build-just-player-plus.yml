name: Build JustPlayer Plus

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - just-player-plus/**
      - .github/workflows/build-just-player-plus.yml
  pull_request:
    paths:
      - just-player-plus/**
      - tools/apply_step5_audio_quality.py
      - .github/workflows/build-just-player-plus.yml

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: just-player-plus

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0

      - name: Apply guarded step 5 patch
        if: hashFiles('tools/apply_step5_audio_quality.py') != ''
        working-directory: .
        run: |
          python3 tools/apply_step5_audio_quality.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add just-player-plus/app/src/main/java/com/brouken/player/PlayerActivity.java
          git rm tools/apply_step5_audio_quality.py
          git commit -m "Step 5: apply audio quality preference"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Verify protected playback construction
        working-directory: .
        run: |
          grep -F '.setExtensionRendererMode(mPrefs.decoderPriority)' just-player-plus/app/src/main/java/com/brouken/player/PlayerActivity.java
          grep -F '.setMapDV7ToHevc(mPrefs.mapDV7ToHevc)' just-player-plus/app/src/main/java/com/brouken/player/PlayerActivity.java
          grep -F 'player.setAudioAttributes(audioAttributes, true);' just-player-plus/app/src/main/java/com/brouken/player/PlayerActivity.java

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
          cache-dependency-path: just-player-plus/**/*.gradle*

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Build release APK
        run: |
          chmod +x gradlew
          set +e
          ./gradlew assembleLatestUniversalRelease --stacktrace --console=plain > ../gradle-build.log 2>&1
          status=$?
          tail -n 200 ../gradle-build.log
          exit $status

      - name: Upload Gradle build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: justplayer-plus-gradle-log
          path: gradle-build.log
          if-no-files-found: warn

      - name: Collect APK
        run: |
          mkdir -p ../artifacts
          find app/build/outputs/apk -type f -name '*.apk' -exec cp {} ../artifacts/ \;
          ls -lah ../artifacts

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: justplayer-plus-apk
          path: artifacts/*.apk
          if-no-files-found: error
