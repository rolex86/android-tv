name: Bootstrap JustPlayer Plus

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/bootstrap-just-player-plus.yml

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Import current Just Player upstream
        shell: bash
        run: |
          set -euo pipefail

          if [ -d just-player-plus ]; then
            echo "just-player-plus already exists; nothing to bootstrap."
            exit 0
          fi

          git clone --depth 1 https://github.com/moneytoo/Player.git /tmp/just-player-upstream
          mkdir -p just-player-plus
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            /tmp/just-player-upstream/ just-player-plus/

          python3 <<'PY'
          from pathlib import Path
          import re

          root = Path('just-player-plus')
          gradle = root / 'app' / 'build.gradle'
          text = gradle.read_text(encoding='utf-8')
          text = text.replace('applicationId "com.brouken.player"', 'applicationId "com.rolex86.justplayerplus"')
          text = text.replace('versionName "0.${versionCode}"', 'versionName "0.${versionCode}-plus.1"')
          text = text.replace('archivesName = "Just.Player.v${defaultConfig.versionName}"', 'archivesName = "JustPlayer.Plus.v${defaultConfig.versionName}"')
          gradle.write_text(text, encoding='utf-8')

          shortcuts = root / 'app' / 'src' / 'main' / 'res' / 'xml' / 'shortcuts.xml'
          if shortcuts.exists():
              value = shortcuts.read_text(encoding='utf-8')
              value = value.replace('com.brouken.player', 'com.rolex86.justplayerplus')
              shortcuts.write_text(value, encoding='utf-8')

          app_name = re.compile(r'(<string\b[^>]*\bname="app_name"[^>]*>).*?(</string>)')
          for strings in root.glob('app/src/main/res/values*/strings.xml'):
              value = strings.read_text(encoding='utf-8')
              value, count = app_name.subn(r'\1JustPlayer Plus\2', value)
              if count:
                  strings.write_text(value, encoding='utf-8')
          PY

          cat > README.md <<'EOF'
          # Android TV

          Android TV applications and utilities maintained by `rolex86`.

          ## JustPlayer Plus

          `just-player-plus/` is a separately installable fork of
          [Just (Video) Player](https://github.com/moneytoo/Player), focused on
          improved language, subtitle and external-player behavior for Android TV
          and Stremio.

          The Android application ID is `com.rolex86.justplayerplus`, so it can be
          installed alongside the original `com.brouken.player` application.

          ### Build

          GitHub Actions builds the release APK after relevant changes. Locally:

          ```bash
          cd just-player-plus
          ./gradlew assembleLatestUniversalRelease
          ```
          EOF

          cat > just-player-plus/UPSTREAM.md <<'EOF'
          # Upstream

          This project was initially imported from:

          - Repository: https://github.com/moneytoo/Player
          - Branch: `master`

          Local identity changes:

          - App name: `JustPlayer Plus`
          - Application ID: `com.rolex86.justplayerplus`
          - Version suffix: `-plus.1`

          The original project is released under The Unlicense. See `LICENSE`.
          EOF

          mkdir -p .github/workflows
          cat > .github/workflows/build-just-player-plus.yml <<'EOF'
          name: Build JustPlayer Plus

          on:
            workflow_dispatch:
            push:
              branches: [main]
              paths:
                - just-player-plus/**
                - .github/workflows/build-just-player-plus.yml
            pull_request:
              paths:
                - just-player-plus/**
                - .github/workflows/build-just-player-plus.yml

          permissions:
            contents: read

          jobs:
            build:
              runs-on: ubuntu-latest
              defaults:
                run:
                  working-directory: just-player-plus

              steps:
                - name: Check out repository
                  uses: actions/checkout@v4

                - name: Set up Java
                  uses: actions/setup-java@v4
                  with:
                    distribution: temurin
                    java-version: '17'
                    cache: gradle
                    cache-dependency-path: just-player-plus/**/*.gradle*

                - name: Set up Android SDK
                  uses: android-actions/setup-android@v3

                - name: Install Android platform
                  run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

                - name: Build release APK
                  run: |
                    chmod +x gradlew
                    ./gradlew assembleLatestUniversalRelease --stacktrace

                - name: Collect APK
                  run: |
                    mkdir -p ../artifacts
                    find app/build/outputs/apk -type f -name '*.apk' -exec cp {} ../artifacts/ \;
                    ls -lah ../artifacts

                - name: Upload APK
                  uses: actions/upload-artifact@v4
                  with:
                    name: justplayer-plus-apk
                    path: artifacts/*.apk
                    if-no-files-found: error
          EOF

          rm -f .github/workflows/bootstrap-just-player-plus.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md just-player-plus .github/workflows
          git commit -m "Import JustPlayer Plus"
          git push origin HEAD:main
