name: Apply step 2 audio languages

on:
  push:
    branches:
      - agent/justplayer-plus-audio-languages
    paths:
      - tools/apply_step2_audio_languages.py
      - .github/workflows/apply-step2-audio-languages.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: agent/justplayer-plus-audio-languages
          fetch-depth: 0

      - name: Apply guarded source patch
        run: python3 tools/apply_step2_audio_languages.py

      - name: Verify protected playback construction is unchanged
        run: |
          grep -F '.setExtensionRendererMode(mPrefs.decoderPriority)' just-player-plus/app/src/main/java/com/brouken/player/PlayerActivity.java
          grep -F '.setMapDV7ToHevc(mPrefs.mapDV7ToHevc)' just-player-plus/app/src/main/java/com/brouken/player/PlayerActivity.java
          grep -F 'player.setAudioAttributes(audioAttributes, true);' just-player-plus/app/src/main/java/com/brouken/player/PlayerActivity.java

      - name: Commit step 2 implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add just-player-plus/app/src/main/java/com/brouken/player/PlusPrefs.java \
                  just-player-plus/app/src/main/java/com/brouken/player/PlayerActivity.java
          git commit -m "Step 2: apply ordered audio languages"
          git push origin HEAD:agent/justplayer-plus-audio-languages
