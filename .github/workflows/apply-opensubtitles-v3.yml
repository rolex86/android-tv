name: Apply OpenSubtitles v3 patch

on:
  push:
    branches: [feature/ai-subtitles]
    paths:
      - .patches/run-opensubtitles-v3

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: feature/ai-subtitles

      - name: Apply patch
        run: python3 .patches/apply_opensubtitles_v3.py

      - name: Validate preference wiring
        run: python3 tools/check_plus_preferences.py

      - name: Commit generated source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf .patches
          rm -f .github/workflows/apply-opensubtitles-v3.yml
          git add -A
          git commit -m "Add direct OpenSubtitles v3 subtitle loading"
          git push origin HEAD:feature/ai-subtitles
