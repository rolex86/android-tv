name: Debug OpenSubtitles patch

on:
  pull_request:
    paths:
      - .github/workflows/debug-opensubtitles-patch.yml

permissions:
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/ai-subtitles
      - name: Run patch and capture output
        run: |
          set +e
          python3 .patches/apply_opensubtitles_v3.py > patch-error.log 2>&1
          echo $? > patch-status.txt
          cat patch-error.log
      - name: Upload patch diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: opensubtitles-patch-debug
          path: |
            patch-error.log
            patch-status.txt
          if-no-files-found: error
